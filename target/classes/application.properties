# ===========================================================================
#  Conexion a SQL Server (host "DEV") con AUTENTICACION INTEGRADA DE WINDOWS
# ===========================================================================
#  No se definen username ni password: la conexion usa la identidad del
#  usuario Windows que ejecuta la aplicacion (Single Sign-On / Kerberos-NTLM).
#
#  REQUISITO NATIVO IMPORTANTE:
#  La autenticacion integrada de Windows necesita la DLL nativa
#      mssql-jdbc_auth-12.6.1.x64.dll
#  cuya version DEBE COINCIDIR con la del driver mssql-jdbc del pom.xml
#  (aqui: 12.6.1). La DLL debe estar:
#    - en una carpeta incluida en el PATH del sistema, o
#    - indicada al arrancar con:  -Djava.library.path="C:\ruta\a\la\dll"
#  Se descarga junto al driver desde:
#    https://learn.microsoft.com/sql/connect/jdbc/download-microsoft-jdbc-driver-for-sql-server
# ===========================================================================
spring.datasource.url=jdbc:sqlserver://DEV:1433;databaseName=PersonasDB;integratedSecurity=true;authenticationScheme=NativeAuthentication;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
# Crea/actualiza el esquema automaticamente a partir de las entidades.
spring.jpa.hibernate.ddl-auto=update
# Dialecto especifico de SQL Server.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Muestra el SQL generado (util en desarrollo).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Vaadin ---
# Limita el escaneo de paquetes para acelerar el arranque.
vaadin.allowed-packages=com.vaadin,org.vaadin,com.utn.personas
